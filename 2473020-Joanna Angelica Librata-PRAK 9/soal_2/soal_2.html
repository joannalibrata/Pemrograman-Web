<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473020-Joanna Angelica Librata</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: Arial;
        }
        #container {
            border: 1px solid black;
            width: 300px;
            padding: 8px;
        }
        #txtNama {
            width: 180px;
        }
    </style>
    <script>
    $(document).ready(function(){
 
        $("#btnAdd").click(function(){
            var nama = $("#txtNama").val();
            if (nama != "") {
                $("<div>" + nama + "</div>").appendTo("#listNama");
                $("#txtNama").val("");
            }
        });
 
        $("#btnSearch").click(function(){
            var kata = $("#txtNama").val().toLowerCase();
 
            $("#listNama div").css("text-decoration", "none");
 
            $("#listNama div").each(function(){
                var isi = $(this).text().toLowerCase();
                if (isi.indexOf(kata) != -1 && kata != "") {
                    $(this).css("text-decoration", "underline");
                }
            });
        });
 
    });
    </script>
</head>
<body>
    <div id="container">
        <input type="text" id="txtNama">
        <button id="btnAdd">Add</button>
        <button id="btnSearch">Search</button>
 
        <div id="listNama">
            <div>John Resig</div>
            <div>George Martin</div>
            <div>Malcom John Sinclair</div>
            <div>J. Ohn</div>
        </div>
    </div>
</body>
</html>
