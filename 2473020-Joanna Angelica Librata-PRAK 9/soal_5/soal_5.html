<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473020-Joanna Angelica Librata</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: Arial;
        }
        #container {
            border: 1px solid black;
            width: 350px;
            padding: 10px;
        }
        #txtCari {
            width: 310px;
            margin-bottom: 10px;
        }
        .perusahaan {
            margin: 3px 0;
        }
    </style>
    <script>
    $(document).ready(function(){
 
        $("#txtCari").keyup(function(){
            var kata = $(this).val().toLowerCase();
 
            $(".perusahaan").css("color", "black");
 
            if (kata != "") {
                $(".perusahaan").each(function(){
                    var nama = $(this).text().toLowerCase();
                    if (nama.indexOf(kata) != -1) {
                        $(this).css("color", "red");
                    }
                });
            }
        });
 
    });
    </script>
</head>
<body>
    <div id="container">
        <input type="text" id="txtCari">
        <div class="perusahaan">Sun Microsystem</div>
        <div class="perusahaan">Apache Software Foundation</div>
        <div class="perusahaan">Oracle Coorporation</div>
        <div class="perusahaan">International Bussiness Machines</div>
        <div class="perusahaan">Microsoft Coorporation</div>
        <div class="perusahaan">Apple Inc</div>
        <div class="perusahaan">Sap Ag</div>
        <div class="perusahaan">Accenture</div>
        <div class="perusahaan">Computer Sciences Coorporation</div>
        <div class="perusahaan">Google</div>
        <div class="perusahaan">Softbank</div>
        <div class="perusahaan">Yahoo</div>
    </div>
</body>
</html>
