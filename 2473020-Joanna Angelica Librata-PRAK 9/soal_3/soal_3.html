<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473020-Joanna Angelica Librata</title>
 <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        div.kotak { width: 40px; height: 40px; margin: 5px; border: 2px solid blue; float: left; }
        span { color: red; }
        #wrapper { border: 1px solid black; width: 470px; padding: 10px; overflow: hidden; }
    </style>
    <script>
    $(document).ready(function(){
 
        $("div.kotak").click(function(){
            $("div.kotak").css("background-color", "");
            $("div.kotak").removeAttr("id");
            $(this).css("background-color", "red");
            $(this).attr("id", "merah");
        });
 
        $("button").click(function(){
            $("div.kotak").each(function(index, domEle){
                if ($(domEle).attr("id") == "merah") {
                    return false;
                }
                $(domEle).css("background-color", "yellow");
            });
        });
 
    });
    </script>
</head>
<body>
    <div id="wrapper">
        <button>Change colors</button><br/><br/>
        <div class="kotak"></div>
        <div class="kotak"></div>
        <div class="kotak"></div>
        <div class="kotak"></div>
        <div class="kotak"></div>
        <div class="kotak"></div>
        <div class="kotak"></div>
        <div class="kotak"></div>
    </div>
</body>
</html>
