<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473020-Joanna Angelica Librata</title>
</head>
<body>
        <style>
            table {
                border: 1px solid black;
                border-collapse: collapse;
            }
            td {
                border: none;
            }
        </style>
        <form>
            <table cellpadding="5" width="350">
                <tr>
                    <td colspan="2" align="left"><h2>Form Tambah Data User</h2></td>
                </tr>
                <tr>
                    <td>Name</td>
                    <td>: <input type="text" name="name" required oninvalid="this.setCustomValidity('Name is required!!!')" oninput="this.setCustomValidity('')"></td>
                </tr>
                <tr>
                    <td>Address</td>
                    <td>: <input type="text" name="address" required oninvalid="this.setCustomValidity('Address is required!!!')" oninput="this.setCustomValidity('')"></td>
                </tr>
                <tr>
                    <td>Email</td>
                    <td>: <input type="email" name="email" required></td>
                </tr>
                <tr>
                    <td>Home Page</td>
                    <td>: <input type="url" name="homepage"></td>
                </tr>
                <tr>
                    <td>Birthday</td>
                    <td>: <input type="date" name="birthday"></td>
                </tr>
                <tr>
                    <td>Favorit Color</td>
                    <td>: <input type="color" name="favcolor" value="#000000"></td>
                </tr>
                <tr>
                    <td>IPK</td>
                    <td>: <input type="number" name="ipk" min="0" max="4" step="0.1" value="0"></td>
                </tr>
                <tr>
                    <td>Phone Number</td>
                    <td>: <input type="tel" name="phone" pattern="\d{3}-\d{7,10}" title="Format: ###-####### sampai ###-##########"></td>
                </tr>
                <tr>
                    <td></td>
                    <td align="left"><input type="submit" value="Add"></td>
                </tr>
            </table>
        </form>
    </body>
</html>
