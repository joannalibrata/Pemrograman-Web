<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473020-Joanna Angelica Librata</title>
 <script src="jquery.js"></script>
    <style>
        body {
            font-family: Arial;
        }
        #kotak {
            border: 1px solid black;
            width: 300px;
            padding: 10px;
        }
        h3 {
            color: green;
            font-size: 14px;
        }
        table {
            width: 500px;
            margin-top: 10px;
        }
        th {
            background-color: black;
            color: white;
            padding: 5px;
        }
        td {
            padding: 4px;
        }
    </style>
    <script>
    $(document).ready(function(){
 
        $("#btnSearch").click(function(){
 
            var pilihan = $(":radio[name='kelas']:checked").val();
            var file = "";
 
            if (pilihan == "all") {
                file = "nilai.js";
            } else if (pilihan == "A") {
                file = "nilaiA.js";
            } else if (pilihan == "B") {
                file = "nilaiB.js";
            } else {
                alert("Pilih dulu kelasnya!");
                return;
            }
 
            $.getJSON(file, function(data){
                var isi = "<table border='1'>";
                isi += "<tr><th>NRP</th><th>NAMA</th><th>KELAS</th><th>NILAI AKHIR</th></tr>";
                $.each(data.nilai, function(i, item){
                    isi += "<tr><td>" + item.nrp + "</td><td>" + item.nama + "</td><td>" + item.kelas + "</td><td>" + item.nilaiakhir + "</td></tr>";
                });
                isi += "</table>";
                $("#hasil").html(isi);
                $("tr:odd").css("background-color", "#FFFFCC");
                $("tr:even").css("background-color", "#CCFFAA");
                $("th").css("background-color", "black");
                $("th").css("color", "white");
            });
 
        });
 
    });
    </script>
</head>
<body>
    <h3>Selamat! Berikut adalah Daftar Mahasiswa yang mendapat<br>Nilai A Pemograman Web SI Tahun Ajaran 2023/2024</h3>
 
    <div id="kotak">
        <input type="radio" name="kelas" value="all"> All<br>
        <input type="radio" name="kelas" value="A"> Kelas A<br>
        <input type="radio" name="kelas" value="B"> Kelas B<br>
        <button id="btnSearch">Search</button>
    </div>
 
    <div id="hasil"></div>
 
</body>
</html>
